<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Will You Be My Valentine?</title>

<style>
body{
    font-family: Arial, sans-serif;
    text-align:center;
    margin-top:100px;
}

button{
    padding:15px 30px;
    font-size:20px;
    margin:10px;
    cursor:pointer;
}

#yes{
    background:#4CAF50;
    color:white;
}

#no{
    background:#f44336;
    color:white;
    position:absolute;
}
</style>
</head>

<body>

<h1>Will Alya spent the rest of her life with Zaahid 💍 ❤️</h1>

<button id="yYESSSSSSSSSSS">Yes 💖</button>
<button id="nNOPE - hehe">No 😢</button>

<script>
const noBtn = document.getElementById("no");

noBtn.addEventListener("mouseover", () => {
    const x = Math.random() * (window.innerWidth - 150);
    const y = Math.random() * (window.innerHeight - 80);

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
});

document.getElementById("yes").onclick = () => {
    document.body.innerHTML =
        "<h1>Yay! ❤️ Thank you!</h1>";
};
</script>

</body>
</html>
